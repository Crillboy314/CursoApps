<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Lista de Asistencia</title>
<style>
  body { font-family: sans-serif; max-width: 700px; margin: 40px auto; padding: 1rem; background: #f5f5f5; }
  h1 { font-size: 24px; font-weight: 600; margin-bottom: 0.25rem; }
  p.sub { color: #888; font-size: 14px; margin-bottom: 1.5rem; }
  .card { background: white; border: 1px solid #e0e0e0; border-radius: 12px; padding: 1rem 1.25rem; display: flex; align-items: center; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
  .avatar { width: 42px; height: 42px; border-radius: 50%; background: #7F77DD; color: white; display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 15px; flex-shrink: 0; }
  .info { flex: 1; min-width: 160px; }
  .info input.nombre { font-size: 15px; font-weight: 600; border: none; outline: none; width: 100%; background: transparent; }
  .info input.rol { font-size: 13px; color: #888; border: none; outline: none; width: 100%; background: transparent; margin-top: 2px; }
  .presente label { font-size: 13px; color: #666; display: flex; align-items: center; gap: 5px; cursor: pointer; }
  input.nota { font-size: 13px; width: 100px; border: none; border-bottom: 1px solid #ddd; outline: none; padding: 2px 0; background: transparent; color: #666; }
  button.eliminar { background: none; border: none; cursor: pointer; color: #aaa; font-size: 18px; padding: 4px; }
  button.agregar { margin-top: 1rem; padding: 10px 20px; border-radius: 8px; border: 1px solid #ccc; background: white; cursor: pointer; font-size: 14px; }
  button.agregar:hover { background: #f0f0f0; }
</style>
</head>
<body>

<h1>Lista de Asistencia</h1>
<p class="sub">Copia una tarjeta, pégala al final y llena tus datos.</p>

<div id="lista">

  <!-- TARJETA DOCENTE — no borrar -->
  <div class="card">
    <div class="avatar">KR</div>
    <div class="info">
      <input class="nombre" value="Kevin Ricardo Rojas Satián" />
      <input class="rol" value="Docente" />
    </div>
    <div class="presente"><label><input type="checkbox" checked /> Presente</label></div>
    <input class="nota" placeholder="Nota..." />
  </div>

  <!-- COPIA ESTA TARJETA PARA AGREGAR ESTUDIANTES -->
  <div class="card">
    <div class="avatar" style="background:#1D9E75;">??</div>
    <div class="info">
      <input class="nombre" placeholder="Tu nombre completo" />
      <input class="rol" value="Estudiante" />
    </div>
    <div class="presente"><label><input type="checkbox" checked /> Presente</label></div>
    <input class="nota" placeholder="Nota..." />
  </div>

</div>

<button class="agregar" onclick="agregarEstudiante()">+ Agregar estudiante</button>

<script>
function agregarEstudiante() {
  const lista = document.getElementById("lista");
  const nueva = document.createElement("div");
  nueva.className = "card";
  nueva.innerHTML = `
    <div class="avatar" style="background:#1D9E75;">??</div>
    <div class="info">
      <input class="nombre" placeholder="Tu nombre completo" />
      <input class="rol" value="Estudiante" />
    </div>
    <div class="presente"><label><input type="checkbox" checked /> Presente</label></div>
    <input class="nota" placeholder="Nota..." />
    <button class="eliminar" onclick="this.parentElement.remove()">✕</button>
  `;
  lista.appendChild(nueva);
  nueva.querySelector(".nombre").focus();
}
</script>

</body>
</html>
