<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Paso 3 — useState</title>
  <style>
    body { background:#0D0D0D; color:#fff; font-family:sans-serif;
           display:flex; justify-content:center; padding:3rem; }
    .caja { background:#1C1C1E; border:1px solid #333; border-radius:12px;
            padding:2rem; text-align:center; }
    h1 { font-size:4rem; color:#6EE7B7; margin:0; }
    button { background:#6EE7B7; color:#0D0D0D; border:none; padding:0.7rem 1.5rem;
             border-radius:8px; font-weight:bold; font-size:1rem; cursor:pointer;
             margin:0.3rem; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script crossorigin src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js"></script>
  <script crossorigin src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.23.5/babel.min.js"></script>

  <script type="text/babel" data-presets="react">
    const { useState } = React;

    function Contador() {
      const [cuenta, setCuenta] = useState(5);

      return (
        <div className="caja">
          <h1>{cuenta}</h1>
          <button onClick={() => setCuenta(cuenta + 1)}>+1</button>
          <button onClick={() => setCuenta(cuenta - 1)}>-1</button>
          <button onClick={() => setCuenta(5)}>Reset</button>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<Contador />);
  </script>
</body>
</html>
