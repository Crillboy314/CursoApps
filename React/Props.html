<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Paso 2 — Componentes y Props</title>
  <style>
    body { background:#0D0D0D; color:#fff; font-family:sans-serif;
           display:flex; justify-content:center; padding:3rem; }
    .contenedor { display:flex; gap:1rem; flex-wrap:wrap; }
    .tarjeta { background:#1C1C1E; border:1px solid #333;
               border-radius:12px; padding:1.5rem; width:180px; }
    .tarjeta h2 { color:#3deca6; margin:0 0 0.5rem 0; }
    .tarjeta p { color:#0d0dda; margin:0; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script crossorigin src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js"></script>
  <script crossorigin src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.23.5/babel.min.js"></script>

  <script type="text/babel" data-presets="react">
    function Tarjeta(props) {
      return (
        <div className="tarjeta">
          <h2>{props.nombre}</h2>
          <p>{props.rol}</p>
        </div>
      );
    }

    function App() {
      return (
        <div className="contenedor">
          <Tarjeta nombre="Ana"  rol="Estudiante" />
          <Tarjeta nombre="Luis" rol="Desarrollador" />
          <Tarjeta nombre="Sofía" rol="Diseñadora" />
          <Tarjeta nombre="Kevin" rol="Programador" />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
